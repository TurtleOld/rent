{% extends 'base.html' %}


{% block content %}
    <div class="container-fluid text-light">
        <div class="row mt-5">
            <div class="col-xl-12">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        {{ form }}
                    </div>
                    <button class="btn btn-primary" type="submit">Добавить</button>
                </form>
            </div>
            <!-- /.col-xl-12 -->
        </div>
        <!-- /.row -->
    </div>
    <!-- /.container-fluid -->

{% endblock %}
